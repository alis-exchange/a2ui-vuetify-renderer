name: Bug report
description: Report incorrect rendering, runtime errors, or catalog/plugin behavior
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The most actionable reports include **expected vs actual** behavior, **versions** of this package and peer dependencies, and a **minimal repro** (A2UI JSONL snippet, small host-app code, or steps against `examples/client`).

        See [CONTRIBUTING.md](https://github.com/alis-exchange/a2ui-vuetify-renderer/blob/main/.github/CONTRIBUTING.md) for development setup and how to run tests locally.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you thought should happen (UI, data binding, actions, catalog validation, etc.).
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead. Paste stack traces, console output, or screenshots if helpful.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce
      description: |
        Minimal steps: A2UI messages (JSONL or structured), `createSurface` / `updateComponents` snippets, or a short description of how to trigger the issue in the playground (`pnpm dev`).
      placeholder: |
        ```jsonl
        {"createSurface":{...}}
        ```
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node.js version
      description: Output of `node -v`.
      placeholder: e.g. v22.14.0
    validations:
      required: true

  - type: input
    id: package_version
    attributes:
      label: Package version / commit
      description: npm version of `@alis-build/a2ui-vuetify-renderer`, or git SHA if linked from the repo.
      placeholder: e.g. 0.1.12 or abc1234

  - type: textarea
    id: peer_versions
    attributes:
      label: Peer dependency versions (host app)
      description: Versions of `vue`, `vuetify`, and `@a2ui/web_core` in the app where you see the issue (from `package.json` lockfile or `pnpm list`).
      placeholder: |
        vue: ...
        vuetify: ...
        @a2ui/web_core: ...

  - type: checkboxes
    id: terms
    attributes:
      label: Code of conduct
      description: By submitting this issue, you follow the project's contribution expectations.
      options:
        - label: I have read [CONTRIBUTING.md](https://github.com/alis-exchange/a2ui-vuetify-renderer/blob/main/.github/CONTRIBUTING.md) and agree to be respectful and constructive.
          required: true
